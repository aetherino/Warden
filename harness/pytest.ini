[pytest]
# Warden backend end-to-end suite. These tests hit the LIVE brain at WARDEN_BASE_URL
# (default http://127.0.0.1:8787). Start it first:
#   cd harness && ./.venv/bin/uvicorn warden.app:app --port 8787
#
# Run all (fast cached + slow live):   ./.venv/bin/pytest
# Fast/cached/stable only:             ./.venv/bin/pytest -m "not live"
# Only the live (uncached) paths:      ./.venv/bin/pytest -m live
testpaths = tests
python_files = test_*.py
addopts = -ra -q --strict-markers
markers =
    live: hits an uncached/slow live upstream (CPSC keyword fan-out, EPA ECHO, Anthropic triage). May take up to 90s and can be rate-limited (e.g. EPA ECHO 429); deselect with -m "not live" for a fast run.
    gate1: rubric §2 — schema-valid dossier for a valid payload.
    gate2: rubric §3 — provenance: every finding has https source.url + non-empty locator.
    gate7: rubric §7 — compliance: no banned health-effect / safe-unsafe tokens; record-state disclaimer.
    gate9: rubric §9 — robustness: empty/unknown/missing-context paths return valid, non-crashing output.
    tiers: tier coverage — ACT (CPSC), ADDRESS (EPA), CONTEXT-suppressed (Prop 65) calibration.
    stability: same cached payload twice -> identical top_tier + counts.
